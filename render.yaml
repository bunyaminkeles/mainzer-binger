databases:
  - name: mainzer-binger-db
    databaseName: mainzer_binger
    user: mainzer_binger
    plan: free

services:
  # Web uygulaması
  - type: web
    name: mainzer-binger
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi --log-file -"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: mainzer-binger-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1"
      - key: PYTHON_VERSION
        value: "3.12.0"

  # Periyodik görev: RSS duyurularını çek (her gece 02:00 Berlin)
  - type: cron
    name: mainzer-binger-rss
    runtime: python
    plan: free
    schedule: "0 1 * * *"   # UTC 01:00 = Berlin 02:00 (kış) / 03:00 (yaz)
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py rss_cek"
    envVars:
      - key: SECRET_KEY
        fromService:
          name: mainzer-binger
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: mainzer-binger-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "localhost"
