{% extends 'base.html' %}
{% block title %}İletişim{% endblock %}
{% block content %}
<div class="container mt-4 mb-5" style="max-width:640px">
  <div class="card">
    <div class="card-header fw-semibold">
      <i class="bi bi-envelope me-2 text-primary"></i>İletişim
    </div>
    <div class="card-body p-4">
      {% if gonderildi %}
      <div class="alert alert-success">
        <i class="bi bi-check-circle me-2"></i>Mesajınız iletildi, teşekkürler!
      </div>
      {% else %}
      <p class="text-muted small mb-4">Öneri, hata bildirimi veya katkı için bize ulaşabilirsiniz.</p>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold small">Ad Soyad <span class="text-muted fw-normal">(opsiyonel)</span></label>
          <input type="text" name="ad" class="form-control form-control-sm" placeholder="Anonim gönderebilirsiniz">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">E-posta <span class="text-muted fw-normal">(yanıt almak isterseniz)</span></label>
          <input type="email" name="eposta" class="form-control form-control-sm" placeholder="ornek@email.com">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Mesaj <span class="text-danger">*</span></label>
          <textarea name="mesaj" class="form-control form-control-sm" rows="5" required placeholder="Mesajınızı yazın..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-send me-1"></i>Gönder
        </button>
      </form>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
