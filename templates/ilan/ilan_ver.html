{% extends 'base.html' %}
{% block title %}İlan Ver{% endblock %}
{% block content %}
<div class="container mt-4" style="max-width:640px">
  <h4 class="mb-4"><i class="bi bi-plus-circle me-2 text-primary"></i>İlan Ver</h4>
  <div class="card">
    <div class="card-body p-4">
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Kategori</label>
          <select name="kategori" class="form-select" required>
            {% for k, v in kategoriler %}<option value="{{ k }}">{{ v }}</option>{% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Başlık</label>
          <input type="text" name="baslik" class="form-control" required maxlength="200">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Açıklama</label>
          <textarea name="icerik" class="form-control" rows="5" required></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Fiyat (€) <span class="text-muted fw-normal">— opsiyonel</span></label>
          <input type="number" name="fiyat" class="form-control" step="0.01" min="0">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">İletişim E-postası</label>
          <input type="email" name="iletisim" class="form-control" required value="{{ user.email }}">
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-send me-2"></i>İlanı Gönder
        </button>
        <small class="text-muted d-block mt-2 text-center">İlanınız incelendikten sonra yayınlanacaktır.</small>
      </form>
    </div>
  </div>
</div>
{% endblock %}
